<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Erős SEO leírás és kulcsszavak a főoldalhoz -->
  <meta name="description" content="AI Media Creator is a cutting-edge creative studio specializing in AI-powered video production, AI logos, animations, and futuristic web design.">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Orbitron', sans-serif; color: #00f5ff; background: #000; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: -2; background: #000; }
    .overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,20,45,0.30) 0%, rgba(0,0,0,0.88) 75%); z-index: -1; }
    header { position: fixed; top: 0; width: 100%; height: 60px; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; backdrop-filter: blur(12px); background: rgba(0,0,0,0.4); }
    .logo { font-size: 22px; font-weight: 900; text-shadow: 0 0 25px #00f5ff; }
    nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    nav a { color: #00f5ff; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 5px 10px; transition: 0.3s; }
    nav a:hover { text-shadow: 0 0 15px #00f5ff; color: white; }
    .main-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; padding-top: 80px; }
    footer { text-align: center; padding: 12px 20px; background: #000; border-top: 1px solid rgba(0, 245, 255, 0.2); font-size: 0.85rem; color: rgba(0, 245, 255, 0.6); z-index: 10; margin-top: auto; }
    footer a { color: #00f5ff; text-decoration: none; margin: 0 15px; transition: 0.3s; }
    footer a:hover { color: white; text-shadow: 0 0 10px #00f5ff; }
    .copyright { margin-top: 5px; opacity: 0.6; }

    @media (max-width: 768px) {
      header { flex-direction: column; height: auto; padding: 15px 5%; }
      nav { margin-top: 12px; gap: 10px; }
      .main-content { padding-top: 180px; } 
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay playsinline id="bgVideo">
    <source src="background.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <header>
    <div class="logo">AI MEDIA CREATOR</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="main-content">
    <!-- Ez a szöveg a képernyőn láthatatlan, de a Google el tudja olvasni! -->
    <h1 style="position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(1px,1px,1px,1px);">AI Media Creator - Professional AI Video & Media Studio</h1>
  </div>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> • 
      <a href="cookies.html">Cookie Policy</a>
    </p>
    <p class="copyright">© 2026 AI MEDIA CREATOR • All Rights Reserved</p>
  </footer>

  <script>
    const video = document.getElementById('bgVideo');
    video.muted = false;
    video.volume = 0.42;
    video.play().catch(() => {});
  </script>
</body>
</html>
