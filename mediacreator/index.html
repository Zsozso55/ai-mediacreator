```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="description"
content="AI Media Creator">

<title>AI MEDIA CREATOR</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

*{

margin:0;
padding:0;

box-sizing:border-box;

}

body{

font-family:'Orbitron',sans-serif;

background:#000;

color:#00f5ff;

overflow-x:hidden;

}

/* VIDEO */

.video-bg{

position:fixed;

inset:0;

width:100%;

height:100dvh;

object-fit:cover;

z-index:-2;

filter:

brightness(1.18)

contrast(1.05)

saturate(1.1);

}

/* OVERLAY */

.overlay{

position:fixed;

inset:0;

background:

radial-gradient(

circle,

rgba(0,20,45,.22) 0%,

rgba(0,0,0,.88) 78%

);

z-index:-1;

}

/* HEADER */

header{

position:fixed;

top:0;

left:0;

width:100%;

padding:

14px 24px;

display:flex;

justify-content:space-between;

align-items:center;

backdrop-filter:blur(12px);

z-index:100;

}

/* LOGO */

.logo{

font-size:28px;

font-weight:900;

text-shadow:

0 0 20px #00f5ff;

}

/* NAV */

nav{

display:flex;

gap:22px;

}

nav a{

color:#00f5ff;

text-decoration:none;

font-size:15px;

transition:.3s;

}

nav a:hover{

color:white;

text-shadow:

0 0 15px #00f5ff;

}

/* TABLET / MOBILE */

@media (max-width:768px){

header{

flex-direction:column;

gap:12px;

padding:12px;

}

.logo{

font-size:20px;

text-align:center;

}

nav{

flex-wrap:wrap;

justify-content:center;

gap:14px;

}

nav a{

font-size:13px;

}

}

/* SMALL PHONES */

@media (max-width:480px){

.logo{

font-size:18px;

}

nav{

gap:10px;

}

nav a{

font-size:12px;

}

}

</style>

</head>

<body>

<video

class="video-bg"

autoplay

muted

loop

playsinline

id="bgVideo">

<source

src="background.mp4"

type="video/mp4">

</video>

<div class="overlay"></div>

<header>

<div class="logo">

AI MEDIA CREATOR

</div>

<nav>

<a href="index.html">

Home

</a>

About

Portfolio

</a>

<a href="contact.html">

Contact

</a>

</nav>

</header>

<script>

const video = document.getElementById('bgVideo');

video.volume = 0.4;

video.play().catch(()=>{});

</script>

</body>

</html>
