<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Media Creator - Professional AI-powered video, animation and media production studio.">
  <title>AI MEDIA CREATOR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');
    
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Orbitron',sans-serif;
      color:#00f5ff;
      background:#000;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }
    
    .video-bg{
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:-2;
    }
    
    .overlay{
      position:fixed;
      inset:0;
      background:radial-gradient(circle, rgba(0,20,45,0.30) 0%, rgba(0,0,0,0.88) 75%);
      z-index:-1;
    }
    
    header{
      position:fixed;
      top:0; width:100%;
      padding:18px 5%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:100;
      backdrop-filter:blur(12px);
      flex-wrap:wrap;
      gap:10px;
    }
    .logo{font-size:24px;font-weight:900;text-shadow:0 0 25px #00f5ff;}

    nav{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
    nav a{color:#00f5ff;text-decoration:none;font-weight:500;font-size:1rem;transition:0.3s;}
    nav a:hover{text-shadow:0 0 15px #00f5ff;color:white;}

    .main-content{
      flex:1;                    /* ez tolja le a footert */
      display:flex;
      align-items:center;
      justify-content:center;
      padding-top:100px;
      text-align:center;
      position:relative;
      z-index:2;
    }

    /* FOOTER - mindig az oldal alján */
    footer{
      margin-top:auto;
      text-align:center;
      padding:25px 20px 30px;
      background:#000;
      border-top:1px solid #00f5ff33;
      font-size:0.95rem;
      color:#00f5ff99;
      z-index:10;
    }
  </style>
</head>
<body>

  <video class="video-bg" autoplay playsinline id="bgVideo">
    <source src="background.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <header>
    <div class="logo">AI MEDIA CREATOR</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="main-content">
    <!-- Üres, mert csak a videó van a háttérben -->
  </div>

  <!-- FOOTER -->
  <footer style="height: 50px; box-sizing: border-box; text-align:center; padding: 10px 20px; background:#000; border-top:1px solid #00f5ff33; font-size:0.95rem; color:#00f5ff99;"
    <p>
      <a href="privacy.html" style="color:#00f5ff; text-decoration:none; margin:0 15px;">Privacy Policy</a> • 
      <a href="cookies.html" style="color:#00f5ff; text-decoration:none; margin:0 15px;">Cookie Policy</a>
    </p>
    <p style="margin-top:10px; opacity:0.6;">© 2026 AI MEDIA CREATOR • All Rights Reserved</p>
  </footer>

  <script>
    const video = document.getElementById('bgVideo');
    video.muted = false;
    video.volume = 0.42;
    video.play().catch(() => {});
  </script>
</body>
</html>
