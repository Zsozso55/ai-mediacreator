<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact AI Media Creator - Professional AI video and animation studio. Get in touch for your next project.">
  <title>Contact Us - AI MEDIA CREATOR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Orbitron',sans-serif;color:#00f5ff;background:#000;}
    .video-bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.4);}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:-1;}
    header{position:fixed;top:0;width:100%;padding:25px 6%;display:flex;justify-content:space-between;align-items:center;z-index:100;backdrop-filter:blur(12px);}
    .logo{font-size:28px;font-weight:900;text-shadow:0 0 25px #00f5ff;}
    nav a{color:#00f5ff;margin:0 22px;text-decoration:none;font-weight:500;transition:0.3s;}
    nav a:hover{text-shadow:0 0 20px #00f5ff;color:white;}
    .content{padding:140px 8% 100px;text-align:center;}
    h1{font-size:4rem;margin-bottom:40px;text-shadow:0 0 40px #00f5ff;}
    .email-box{
      background:rgba(0,30,50,0.7);
      border:2px solid #00f5ff;
      border-radius:20px;
      padding:60px 50px;
      max-width:620px;
      margin:40px auto;
    }
    .email-link{
      font-size:2rem;
      color:#00f5ff;
      text-decoration:none;
      display:block;
      margin:25px 0;
    }
    .email-link:hover{
      text-shadow:0 0 25px #00f5ff;
    }
    .btn{
      padding:18px 50px;
      font-size:1.2rem;
      background:transparent;
      color:#00f5ff;
      border:2px solid #00f5ff;
      border-radius:50px;
      cursor:pointer;
      transition:all 0.4s;
      text-transform:uppercase;
      letter-spacing:2px;
    }
    .btn:hover{
      background:#00f5ff;
      color:#000;
      box-shadow:0 0 40px #00f5ff;
    }
  </style>
</head>
<body>

  <video class="video-bg" autoplay loop muted playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <header>
    <div class="logo">AI MEDIA CREATOR</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="content">
    <h1>Get In Touch</h1>
    <p style="font-size:1.4rem; margin-bottom:40px;">Ready to bring your AI project to life?</p>
    
    <div class="email-box">
      <a href="mailto:info@ai-mediacreator.com" class="email-link">
        info@ai-mediacreator.com
      </a>
      <button onclick="window.location.href='mailto:info@ai-mediacreator.com'" class="btn">
        ✉️ Send us an Email
      </button>
    </div>

    <p style="margin-top:50px; opacity:0.7;">We usually reply within 24 hours.</p>
  </div>
</body>
</html>
