<style>

    #ai-chat-widget {

        width: 350px;
        height: 450px;
        background-color: #050508;
        border: 1px solid #00e5ff;
        border-radius: 12px;

        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        background: linear-gradient(90deg, #1a1a2e 0%, #050508 100%);

<!-- LEBEGŐ GOMB -->
<button id="ai-chat-fab" aria-label="Open chat">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
</button>
 
<!-- CHAT WIDGET -->
<div id="ai-chat-widget">
    <div id="ai-chat-header">
        <span>✦ Nova AI Assistant</span>
        <button id="ai-chat-close-btn">✕</button>
    </div>
    <div id="ai-chat-messages">
        <div class="chat-message ai-message">Welcome! How can I help you today?</div>
    </div>
    <div id="ai-chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Type your question..." autocomplete="off">
        <button id="ai-chat-send-btn">Send</button>
    </div>
</div>
 
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const fab = document.getElementById('ai-chat-fab');
        const chatWidget = document.getElementById('ai-chat-widget');
        const closeBtn = document.getElementById('ai-chat-close-btn');
        const messagesContainer = document.getElementById('ai-chat-messages');
        const inputField = document.getElementById('ai-chat-input');
        const sendBtn = document.getElementById('ai-chat-send-btn');
 
        fab.addEventListener('click', () => {
            chatWidget.classList.add('open');
            fab.style.display = 'none';
            inputField.focus();
        });
 
        closeBtn.addEventListener('click', () => {
            chatWidget.classList.remove('open');
            fab.style.display = 'flex';
        });
 
        async function sendChatMessage() {
            const userText = inputField.value.trim();
            if (!userText) return;
 
            appendMessage(userText, 'user-message');
            inputField.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
 
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
 
                const data = await response.json();
 
                if (data.reply) {
                    appendMessage(data.reply, 'ai-message');
                } else {
                    appendMessage("Error: Invalid response from server.", 'ai-message');
                }
 
            } catch (error) {
                appendMessage("Error: Could not connect to the server.", 'ai-message');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        }
 
        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${className}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
 
        sendBtn.addEventListener('click', sendChatMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });
    });
</script>
