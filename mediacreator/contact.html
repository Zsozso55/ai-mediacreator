<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - AI MEDIA CREATOR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Orbitron', sans-serif; color: #00f5ff; background: #000; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.4); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: -1; }
    header { position: fixed; top: 0; width: 100%; height: 60px; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; backdrop-filter: blur(12px); background: rgba(0,0,0,0.4); }
    .logo { font-size: 22px; font-weight: 900; text-shadow: 0 0 25px #00f5ff; }
    nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    nav a { color: #00f5ff; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 5px 10px; transition: 0.3s; }
    nav a:hover { text-shadow: 0 0 15px #00f5ff; color: white; }
    .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 5% 50px; text-align: center; z-index: 2; }
    h1 { font-size: 2.8rem; margin-bottom: 20px; text-shadow: 0 0 40px #00f5ff; }
    .contact-box { background: rgba(0,30,50,0.7); border: 2px solid #00f5ff; border-radius: 20px; padding: 40px 30px; max-width: 620px; width: 100%; margin: 0 auto; box-shadow: 0 0 20px rgba(0,245,255,0.1); }
    .email-link { font-size: 1.9rem; color: #00f5ff; text-decoration: none; display: block; margin: 20px 0; word-break: break-all; }
    .contact-btn { padding: 16px 35px; font-size: 1.1rem; background: transparent; color: #00f5ff; border: 2px solid #00f5ff; border-radius: 50px; cursor: pointer; transition: 0.3s; font-family: 'Orbitron', sans-serif; }
    .contact-btn:hover { background: #00f5ff; color: #000; box-shadow: 0 0 20px #00f5ff; }
    footer { text-align: center; padding: 12px 20px; background: #000; border-top: 1px solid rgba(0, 245, 255, 0.2); font-size: 0.85rem; color: rgba(0, 245, 255, 0.6); z-index: 10; margin-top: auto; }
    footer a { color: #00f5ff; text-decoration: none; margin: 0 15px; transition: 0.3s; }
    footer a:hover { color: white; text-shadow: 0 0 10px #00f5ff; }
    .copyright { margin-top: 5px; opacity: 0.6; }

    @media (max-width: 768px) {
      header { flex-direction: column; height: auto; padding: 15px 5%; }
      nav { margin-top: 12px; gap: 10px; }
      .main-content { padding-top: 180px; } /* Mobilos belelógás gátló */
      h1 { font-size: 2.2rem; }
      .email-link { font-size: 1.4rem; }
      .contact-box { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline><source src="background.mp4" type="video/mp4"></video>
  <div class="overlay"></div>

  <header>
    <div class="logo">AI MEDIA CREATOR</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="main-content">
    <h1>Get In Touch</h1>
    <p style="font-size:1.35rem; max-width:700px; margin:0 auto 30px; opacity: 0.9;">Ready to bring your AI project to life?</p>
    
    <div class="contact-box">
      <a href="mailto:info@ai-mediacreator.com" class="email-link">info@ai-mediacreator.com</a>
      <button onclick="window.location.href='mailto:info@ai-mediacreator.com'" class="contact-btn">✉️ Send us an Email</button>
    </div>
  </div>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> • 
      <a href="cookies.html">Cookie Policy</a>
    </p>
    <p class="copyright">© 2026 AI MEDIA CREATOR • All Rights Reserved</p>
  </footer>
</body>
</html>
