  <style>

    *{margin:0;padding:0;box-sizing:border-box;}

    p{font-size:1.15rem;line-height:1.8;opacity:0.9;margin-bottom:25px;}
    @media (max-width: 600px) {
      h1{font-size:2.3rem;}
      .content{padding:100px 5% 60px;}
